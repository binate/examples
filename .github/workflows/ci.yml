name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Cache builder bundle
        uses: actions/cache@v5
        with:
          path: ~/.cache/binate/builders
          key: builders-${{ hashFiles('BUILDER_VERSION') }}

      - name: Build all examples
        run: ./scripts/build-all.sh

      - name: Run unit tests
        run: ./scripts/test-all.sh

      - name: Run example end-to-end suites
        run: ./scripts/e2e-all.sh
